<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Rock Collection Store</title>
    <!-- This line right here connects your style.css file! -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>mirazbakis/mirazbakis.github.io Rock Store</h1>
        <p>Collected from the beaches of Pelion.</p>
    </header>
    
    <main class="store-grid">
        <!-- Item 1 -->
        <div class="rock-card">
            <img src="https://via.placeholder.com/200" alt="Amethyst Geode">
            <h2>ROCK TYPE 1</h2>
            <p class="price">$45.00</p>
            <button>Buy Now</button>
        </div>
        
        <!-- Item 2 -->
        <div class="rock-card">
            <img src="https://via.placeholder.com/200" alt="Rose Quartz">
            <h2>ROCK TYPE 2</h2>
            <p class="price">$15.00</p>
            <button>Buy Now</button>
        </div>
    </main>

</body>
</html>
