<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPA Web Signer</title>
    <!-- External Scripts for Signing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/forge/1.3.1/forge.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/zsign-web@latest/dist/index.min.js"></script>
    
    <style>
        :root {
            --bg-color: #030303;
            --card-bg: #0d0d12;
            --border-color: rgba(255, 255, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #e2e8f0;
            --accent-blue: #3b82f6;
            --accent-hover: #2563eb;
            --warning-bg: rgba(210, 153, 34, 0.1);
            --warning-border: rgba(210, 153, 34, 0.4);
            --warning-text: #fde047;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 3rem 1rem;
        }

        /* Bulletproof centering wrapper */
        .wrapper {
            max-width: 540px;
            margin: 0 auto;
            width: 100%;
        }

        /* Return to Main Page Button */
        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            transition: color 0.2s ease, transform 0.2s ease;
        }
        
        .back-link:hover { 
            color: var(--text-primary); 
            transform: translateX(-4px);
        }

        .container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6);
        }

        .title-section {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1.5rem;
        }

        .title-section h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .upload-group {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .input-box {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-box label {
            font-size: 0.85rem;
            font-weight: 600; 
            color: var(--text-secondary);
        }

        .file-input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 0.9rem;
            font-weight: 500;
            outline: none;
            transition: all 0.2s ease;
        }

        .file-input:hover {
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.06);
        }

        .file-input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .file-input::file-selector-button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            margin-right: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .file-input::file-selector-button:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.25);
        }

        .btn-sign {
            width: 100%;
            padding: 1rem;
            background: var(--accent-blue);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 0.5rem;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .btn-sign:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
        }

        .btn-sign:active {
            transform: translateY(1px);
        }

        #status {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-align: center;
            word-break: break-all;
            transition: all 0.3s ease;
        }

        .processing {
            color: #60a5fa !important;
            border-color: rgba(96, 165, 250, 0.4) !important;
            box-shadow: 0 0 12px rgba(96, 165, 250, 0.1);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .success {
            color: #4ade80 !important;
            border-color: rgba(74, 222, 128, 0.4) !important;
            background: rgba(74, 222, 128, 0.05) !important;
        }

        .error {
            color: #f87171 !important;
            border-color: rgba(248, 113, 113, 0.4) !important;
            background: rgba(248, 113, 113, 0.05) !important;
        }

        .disclaimer {
            margin-top: 1.5rem;
            padding: 1rem;
            background-color: var(--warning-bg);
            border: 1px solid var(--warning-border);
            border-radius: 10px;
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
        }

        .disclaimer-icon {
            font-size: 1.25rem;
            line-height: 1;
        }

        .disclaimer-content strong {
            display: block;
            margin-bottom: 0.25rem;
            font-size: 0.9rem;
            color: var(--warning-text);
        }
        
        .disclaimer-content p {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .footer-credit {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .footer-credit a {
            color: var(--text-primary);
            text-decoration: underline;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <!-- Main Centered Wrapper -->
    <div class="wrapper">
        <a href="index.html" class="back-link">← Return to Main Page</a>

        <div class="container">
            <div class="title-section">
                <h1>IPA Web Signer</h1>
            </div>
            
            <div class="upload-group">
                <div class="input-box">
                    <label>1. Apple p12 File (.p12)</label>
                    <input type="file" class="file-input" id="p12File" accept=".p12">
                </div>
                
                <div class="input-box">
                    <label>2. p12 Password</label>
                    <input type="password" class="file-input" id="p12Password" placeholder="Enter certificate password">
                </div>
                
                <div class="input-box">
                    <label>3. Provisioning Profile (.mobileprovision)</label>
                    <input type="file" class="file-input" id="provFile" accept=".mobileprovision">
                </div>
            
                <div class="input-box">
                    <label>4.  IPA File (.ipa)</label>
                    <input type="file" class="file-input" id="ipaFile" accept=".ipa">
                </div>
            </div>
        
            <button class="btn-sign" id="signButton" onclick="processAndSign()">Sign IPA File</button>
            <div id="status">Status: Ready</div>

            <div class="disclaimer">
                <div class="disclaimer-icon">🛡️</div>
                <div class="disclaimer-content">
                    <strong>Privacy First</strong>
                    <p>This tool runs entirely locally in your web browser. Your files, certificates, and passwords are <b>never</b> uploaded to any external server.</p>
                </div>
            </div>
        </div>

        <div class="footer-credit">
            <p>IPA Signer is powered by the open-source engine <a href="https://github.com/zhlynn/zsign" target="_blank">zsign</a> by zhlynn (MIT License).</p>
        </div>
    </div>

    <!-- Signing Logic -->
    <script>
        window.processAndSign = async function() {
            const statusEl = document.getElementById('status');
            statusEl.className = 'processing';
            
            try {
                if (!window.zsignWeb) {
                    throw new Error("Signing engine (zsignWeb) failed to load from CDN. Check your internet connection.");
                }

                const p12File = document.getElementById('p12File').files[0];
                const password = document.getElementById('p12Password').value || "";
                const provFile = document.getElementById('provFile').files[0];
                const ipaFile = document.getElementById('ipaFile').files[0];

                if (!p12File || !provFile || !ipaFile) {
                    throw new Error("Please select all required files (.p12, .mobileprovision, and .ipa).");
                }

                statusEl.innerText = "Status: Initializing background signing engine...";
                
                const p12Buffer = new Uint8Array(await p12File.arrayBuffer());
                const provBuffer = new Uint8Array(await provFile.arrayBuffer());
                const ipaBuffer = new Uint8Array(await ipaFile.arrayBuffer());

                statusEl.innerText = "Status: Executing signature script inside browser thread...";
                
                const signedIpaBytes = await window.zsignWeb.sign({
                    ipa: ipaBuffer,
                    p12: p12Buffer,
                    password: password,
                    provision: provBuffer
                });
                
                if (!signedIpaBytes) {
                    throw new Error("Signing engine returned an empty output.");
                }

                statusEl.innerText = "Status: Packing distribution package...";
                const finalBlob = new Blob([signedIpaBytes], { type: "application/octet-stream" });
                
                const url = URL.createObjectURL(finalBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "Signed_" + ipaFile.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                statusEl.className = 'success';
                statusEl.innerText = "Status: Done! Check your downloads folder.";
            } catch (e) {
                console.error("Detailed Signing Error:", e);
                const errorMessage = e.message || e.toString() || "Unknown error";
                statusEl.className = 'error';
                statusEl.innerText = "Status: Error - " + errorMessage;
            }
        }
    </script>
</body>
</html>
