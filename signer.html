<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPA Web Signer</title>
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@700,500,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121824;
            --card-bg: #1a2232;
            --border-color: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent-blue: #3b82f6;
            --accent-hover: #2563eb;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Satoshi', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 520px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        }

        .title-section {
            text-align: center;
            margin-bottom: 2rem;
        }

        .title-section h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .title-section p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .upload-group {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        .input-box {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-box label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .file-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px dashed var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: border-color 0.2s ease, background 0.2s ease;
        }

        .file-input:hover {
            border-color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.05);
        }

        .file-input::file-selector-button {
            background: var(--accent-blue);
            border: none;
            color: #ffffff;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-weight: 500;
            margin-right: 0.75rem;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .file-input::file-selector-button:hover {
            background: var(--accent-hover);
        }

        .btn-sign {
            width: 100%;
            padding: 0.9rem;
            background: var(--accent-blue);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        .btn-sign:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-sign:active {
            transform: translateY(0);
        }

        .status-box {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-align: center;
            display: none;
        }

        .footer-credit {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .footer-credit a {
            color: var(--text-secondary);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="title-section">
            <h1>IPA Web Signer</h1>
            <p>Select your files below to sign your iOS application</p>
        </div>

        <div class="upload-group">
            <div class="input-box">
                <label>IPA File</label>
                <input type="file" class="file-input" id="ipaFile" accept=".ipa">
            </div>

            <div class="input-box">
                <label>Mobile Provision</label>
                <input type="file" class="file-input" id="provFile" accept=".mobileprovision">
            </div>

            <div class="input-box">
                <label>P12 Certificate</label>
                <input type="file" class="file-input" id="p12File" accept=".p12">
            </div>

            <div class="input-box">
                <label>P12 Password</label>
                <input type="password" class="file-input" id="p12Password" placeholder="Enter certificate password">
            </div>
        </div>

        <button class="btn-sign" onclick="startSigning()">Sign IPA</button>

        <div class="status-box" id="statusBox">
            Ready to sign.
        </div>
    </div>

    <div class="footer-credit">
        Powered by the open-source zsign engine by zhlynn (MIT License)
    </div>

    <script>
        function startSigning() {
            const statusBox = document.getElementById('statusBox');
            statusBox.style.display = 'block';
            statusBox.innerText = 'Processing files...';
            // Your zsign signing logic goes here
        }
    </script>
</body>
</html>
