<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPA Web Signer — Miraz Bakis</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/forge/1.3.1/forge.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://unpkg.com/zsign-web@latest/dist/index.min.js"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #238636;
            --accent-hover: #2ea043;
            --input-bg: #0d1117;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            max-width: 520px;
            margin: 60px auto;
            padding: 20px;
            line-height: 1.5;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        .back-link:hover { 
            color: var(--text-primary); 
        }

        .box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 28px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        h2 {
            margin-top: 0;
            font-size: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        input[type="file"],
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 16px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="file"]:focus,
        input[type="password"]:focus {
            border-color: var(--accent);
        }

        input[type="file"]::file-selector-button {
            background: var(--border-color);
            color: var(--text-primary);
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
            transition: background 0.2s;
        }

        input[type="file"]::file-selector-button:hover {
            background: #484f58;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent);
            color: white;
            border: none;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 4px;
        }

        button:hover {
            background-color: var(--accent-hover);
        }

        button:active {
            transform: scale(0.99);
        }

        #status {
            margin-top: 16px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            background: var(--input-bg);
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            text-align: center;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">← Back to Hub</a>

    <div class="box">
        <h2>Static IPA Web Signer</h2>
        
        <label>1. Apple Certificate (.p12):</label>
        <input type="file" id="p12File" accept=".p12">
        
        <label>2. Certificate Password:</label>
        <input type="password" id="p12Password" placeholder="Enter certificate password">
        
        <label>3. Provisioning Profile (.mobileprovision):</label>
        <input type="file" id="provFile" accept=".mobileprovision">
    
        <label>4. Unsigned IPA File (.ipa):</label>
        <input type="file" id="ipaFile" accept=".ipa">
    
        <button id="signButton" onclick="processAndSign()">Sign IPA File</button>
        <div id="status">Status: Ready</div>
    </div>

    <script>
        window.processAndSign = async function() {
            const statusEl = document.getElementById('status');
            
            try {
                // 1. Check if the WebAssembly engine script successfully loaded from unpkg
                if (!window.zsignWeb) {
                    throw new Error("Signing engine (zsignWeb) failed to load from CDN. Check your internet connection or script source.");
                }

                const p12File = document.getElementById('p12File').files[0];
                const password = document.getElementById('p12Password').value || "";
                const provFile = document.getElementById('provFile').files[0];
                const ipaFile = document.getElementById('ipaFile').files[0];

                if (!p12File || !provFile || !ipaFile) {
                    alert("Please select all required files (.p12, .mobileprovision, and .ipa).");
                    return;
                }

                statusEl.innerText = "Status: Initializing background signing engine...";
                
                // Read uploaded assets straight into Uint8Arrays
                const p12Buffer = new Uint8Array(await p12File.arrayBuffer());
                const provBuffer = new Uint8Array(await provFile.arrayBuffer());
                const ipaBuffer = new Uint8Array(await ipaFile.arrayBuffer());

                statusEl.innerText = "Status: Executing signature script inside browser thread...";
                
                // Call global unpkg engine wrapper directly 
                const signedIpaBytes = await window.zsignWeb.sign({
                    ipa: ipaBuffer,
                    p12: p12Buffer,
                    password: password,
                    provision: provBuffer
                });
                
                if (!signedIpaBytes) {
                    throw new Error("Signing engine returned an empty output.");
                }

                statusEl.innerText = "Status: Packing distribution package...";
                const finalBlob = new Blob([signedIpaBytes], { type: "application/octet-stream" });
                
                const url = URL.createObjectURL(finalBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "Signed_" + ipaFile.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
                statusEl.innerText = "Status: Done! Check downloads.";
            } catch (e) {
                console.error("Detailed Signing Error:", e);
                // Displays the real error message instead of 'undefined'
                const errorMessage = e.message || e.toString() || "Unknown error";
                statusEl.innerText = "Status: Error - " + errorMessage;
            }
        }
    </script>
</body>
</html>
