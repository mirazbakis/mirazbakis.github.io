<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Rock Identifier & Value Estimator</title>
    <!-- TensorFlow.js and MobileNet CDNs -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@latest"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .container {
            width: 100%;
            max-width: 540px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 32px 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        /* Return Button */
        .top-nav {
            margin-bottom: 24px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-1px);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 0.95rem;
            margin-bottom: 28px;
        }

        /* Upload Area */
        .upload-area {
            border: 2px dashed #475569;
            border-radius: 16px;
            padding: 36px 20px;
            text-align: center;
            background: #0f172a;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .upload-area:hover {
            border-color: #3b82f6;
            background: #131d31;
        }

        .upload-area p {
            color: #cbd5e1;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .upload-area input {
            display: none;
        }

        .upload-area img {
            max-width: 100%;
            max-height: 240px;
            margin-top: 16px;
            border-radius: 12px;
            border: 1px solid #334155;
            object-fit: cover;
        }

        /* Results Card */
        .results {
            margin-top: 24px;
            padding: 20px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 14px;
        }

        .results h2 {
            font-size: 1.05rem;
            color: #f8fafc;
            margin-bottom: 16px;
            font-weight: 700;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #e2e8f0;
            margin-top: 10px;
        }

        .confidence-bar {
            height: 6px;
            background: #334155;
            border-radius: 10px;
            margin-top: 6px;
            overflow: hidden;
            width: 100%;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        /* Value Estimate Badge */
        .value-estimate {
            margin-top: 20px;
            padding: 16px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.25);
            border-radius: 12px;
            text-align: center;
            color: #10b981;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .value-estimate strong {
            display: block;
            font-size: 1.5rem;
            color: #34d399;
            margin-top: 4px;
            font-weight: 700;
        }

        .loading {
            text-align: center;
            color: #60a5fa;
            margin-top: 20px;
            font-weight: 500;
            display: none;
            font-size: 0.95rem;
        }

        .error {
            color: #f87171;
            text-align: center;
            margin-top: 14px;
            font-size: 0.9rem;
        }

        .disclaimer {
            font-size: 0.78rem;
            color: #64748b;
            margin-top: 12px;
            text-align: center;
            line-height: 1.4;
        }

        @media (max-width: 600px) {
            .container {
                padding: 24px 16px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Return Button -->
        <div class="top-nav">
            <a href="index.html" class="back-btn">← Return to Main Page</a>
        </div>

        <h1>🪨 Rock Identifier</h1>
        <p class="subtitle">Upload a photo to estimate its rock type & value</p>

        <div class="upload-area" id="uploadArea">
            <p>📸 Click or drag an image here</p>
            <input type="file" id="imageInput" accept="image/*" />
            <img id="preview" style="display:none;" alt="Preview" />
        </div>

        <div class="loading" id="loading">🔍 Analyzing your rock...</div>
        <div class="error" id="error"></div>

        <div class="results" id="results" style="display:none;">
            <h2>🔬 Identification Results</h2>
            <div id="predictions"></div>
            <div class="value-estimate" id="valueEstimate">
                Estimated Value
                <strong id="valueAmount">—</strong>
            </div>
            <p class="disclaimer">
                ⚠️ Value is an estimate based on rock type, market heuristics, and visual features.
            </p>
        </div>
    </div>

    <script>
        // ----- ROCK TYPES & VALUE MAPPING -----
        const ROCK_DATA = {
            'granite':       { label: 'Granite',       baseValue: 15,   range: [5, 80] },
            'marble':        { label: 'Marble',        baseValue: 25,   range: [10, 120] },
            'sandstone':     { label: 'Sandstone',     baseValue: 8,    range: [2, 40] },
            'slate':         { label: 'Slate',         baseValue: 10,   range: [3, 50] },
            'basalt':        { label: 'Basalt',        baseValue: 6,    range: [0.50, 30] },
            'quartzite':     { label: 'Quartzite',     baseValue: 20,   range: [8, 100] },
            'limestone':     { label: 'Limestone',     baseValue: 5,    range: [0.50, 25] },
            'gneiss':        { label: 'Gneiss',        baseValue: 12,   range: [4, 60] },
            'schist':        { label: 'Schist',        baseValue: 10,   range: [3, 50] },
            'obsidian':      { label: 'Obsidian',      baseValue: 30,   range: [15, 150] },
            'jade':          { label: 'Jade',          baseValue: 80,   range: [40, 300] },
            'amethyst':      { label: 'Amethyst',      baseValue: 45,   range: [20, 200] },
            'quartz':        { label: 'Quartz',        baseValue: 15,   range: [5, 75] },
            'feldspar':      { label: 'Feldspar',      baseValue: 8,    range: [2, 35] },
            'mica':          { label: 'Mica',          baseValue: 5,    range: [0.50, 20] },
            'not_a_rock':    { label: 'Not a Rock',    baseValue: 0,    range: [0, 0] }
        };

        const CLASS_MAPPING = {
            'granite': ['granite', 'stone', 'rock'],
            'marble': ['marble', 'statue', 'sculpture'],
            'sandstone': ['sandstone', 'sand', 'stone'],
            'slate': ['slate', 'tile', 'roof'],
            'basalt': ['basalt', 'volcanic', 'lava'],
            'quartzite': ['quartzite', 'quartz'],
            'limestone': ['limestone', 'chalk'],
            'gneiss': ['gneiss'],
            'schist': ['schist'],
            'obsidian': ['obsidian', 'volcanic glass'],
            'jade': ['jade', 'jadeite'],
            'amethyst': ['amethyst', 'purple quartz'],
            'quartz': ['quartz', 'crystal'],
            'feldspar': ['feldspar'],
            'mica': ['mica']
        };

        function getRockType(mobilenetLabel) {
            const lower = mobilenetLabel.toLowerCase();
            for (const [rock, keywords] of Object.entries(CLASS_MAPPING)) {
                for (const kw of keywords) {
                    if (lower.includes(kw)) return rock;
                }
            }
            return null;
        }

        function estimateValue(rockType, confidence) {
            if (!rockType || !ROCK_DATA[rockType]) return { value: 0, range: [0, 0] };
            const data = ROCK_DATA[rockType];
            const confidenceBoost = 0.5 + (confidence * 1.0);
            let raw = data.baseValue * confidenceBoost;
            const clamped = Math.min(Math.max(raw, data.range[0]), data.range[1]);
            return { value: Math.round(clamped * 100) / 100, range: data.range };
        }

        // ----- DOM Elements -----
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const resultsDiv = document.getElementById('results');
        const predictionsDiv = document.getElementById('predictions');
        const valueAmount = document.getElementById('valueAmount');

        let model = null;

        // ----- Safe Model Loading -----
        async function loadModel() {
            try {
                if (typeof mobilenet === 'undefined') {
                    throw new Error('MobileNet script not loaded.');
                }
                model = await mobilenet.load();
                console.log('✅ MobileNet loaded successfully');
            } catch (err) {
                error.textContent = 'Could not load AI engine. Check internet connection and refresh.';
                console.error(err);
            }
        }

        window.addEventListener('DOMContentLoaded', loadModel);

        // ----- File Upload Events -----
        uploadArea.addEventListener('click', () => fileInput.click());
        uploadArea.addEventListener('dragover', (e) => { 
            e.preventDefault(); 
            uploadArea.style.borderColor = '#3b82f6';
            uploadArea.style.background = '#131d31';
        });
        uploadArea.addEventListener('dragleave', () => { 
            uploadArea.style.borderColor = '#475569';
            uploadArea.style.background = '#0f172a';
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#475569';
            uploadArea.style.background = '#0f172a';
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                error.textContent = 'Please upload a valid image file.';
                return;
            }
            error.textContent = '';
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                preview.style.display = 'block';
                resultsDiv.style.display = 'none';
                classifyImage(e.target.result);
            };
            reader.readAsDataURL(file);
        }

        // ----- Image Classification -----
        async function classifyImage(imgData) {
            if (!model) {
                error.textContent = 'AI model is still loading. Please wait a moment and try again.';
                return;
            }
            loading.style.display = 'block';
            predictionsDiv.innerHTML = '';
            valueAmount.textContent = '—';

            try {
                const img = new Image();
                img.src = imgData;
                await new Promise((resolve) => { img.onload = resolve; });

                const predictions = await model.classify(img);
                loading.style.display = 'none';
                resultsDiv.style.display = 'block';

                let html = '';
                let bestRock = null;
                let bestConfidence = 0;

                for (const pred of predictions) {
                    const rock = getRockType(pred.className);
                    const conf = (pred.probability * 100).toFixed(1);
                    const displayName = rock && ROCK_DATA[rock] ? ROCK_DATA[rock].label : pred.className;
                    const isRock = rock !== null;
                    html += `
                        <div class="result-item">
                            <span>${displayName} ${isRock ? '🪨' : '🔍'}</span>
                            <span>${conf}%</span>
                        </div>
                        <div class="confidence-bar">
                            <div class="confidence-fill" style="width:${conf}%;"></div>
                        </div>
                    `;
                    if (isRock && pred.probability > bestConfidence) {
                        bestRock = rock;
                        bestConfidence = pred.probability;
                    }
                }

                if (!bestRock) {
                    const all = await model.classify(img, 100);
                    for (const pred of all) {
                        const rock = getRockType(pred.className);
                        if (rock && pred.probability > bestConfidence) {
                            bestRock = rock;
                            bestConfidence = pred.probability;
                        }
                    }
                }

                predictionsDiv.innerHTML = html;

                if (bestRock && bestRock !== 'not_a_rock') {
                    const result = estimateValue(bestRock, bestConfidence);
                    const label = ROCK_DATA[bestRock]?.label || bestRock;
                    valueAmount.textContent = `$${result.value.toFixed(2)} (${label})`;
                } else {
                    valueAmount.textContent = 'Not a recognizable rock';
                }

            } catch (err) {
                loading.style.display = 'none';
                error.textContent = 'Error analyzing image: ' + err.message;
                console.error(err);
            }
        }
    </script>
</body>
</html>
